<app-navegacion [listaNavegacion]="listaNavegacion"></app-navegacion>
<div class="container">
  <div class="left-container">
    <div class="info-requerida">
      <p class="info-seleccion">Seleccione día y grupos logísticos</p>
      <mat-form-field appearance="outline">
        <mat-label>Día logístico</mat-label>
        <mat-select (selectionChange)="obtenerGruposLogisticos($event)">
          <mat-option
            *ngFor="let dia of listaDiasLogisticos | keyvalue: retornarCero"
            [value]="dia.key"
            >{{ dia.value }}</mat-option
          >
        </mat-select>
      </mat-form-field>
      <div class="tabla-grupos-logisticos" *ngIf="mostrarGruposLogisticos">
        <table mat-table [dataSource]="listaGruposLogisticos">
          <ng-container matColumnDef="select">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let row" style="padding-right: 10px">
              <mat-checkbox
                (click)="$event.stopPropagation()"
                (change)="
                  $event ? seleccionGruposLogisticos.toggle(row) : null;
                  obtenerGruposLogisticosSeleccionados(row)
                "
                [checked]="seleccionGruposLogisticos.isSelected(row)"
              >
              </mat-checkbox>
            </td>
          </ng-container>
          <ng-container matColumnDef="grupo_log">
            <th mat-header-cell *matHeaderCellDef>Grupo logístico</th>
            <td mat-cell *matCellDef="let dato">
              {{ dato.grupo_log }}
            </td>
          </ng-container>
          <ng-container matColumnDef="zona">
            <th mat-header-cell *matHeaderCellDef>Macrozona</th>
            <td mat-cell *matCellDef="let dato">
              {{ dato.zona }}
            </td>
          </ng-container>
          <ng-container matColumnDef="saturacion">
            <th mat-header-cell *matHeaderCellDef>Saturación</th>
            <td mat-cell *matCellDef="let dato">
              {{ dato.saturacion.toFixed(2) }}%
            </td>
          </ng-container>
          <tr
            mat-header-row
            *matHeaderRowDef="columnasTablaGruposLogisticos"
          ></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: columnasTablaGruposLogisticos"
            (click)="
              seleccionGruposLogisticos.toggle(row);
              obtenerGruposLogisticosSeleccionados(row)
            "
            [ngClass]="{
              seleccionado_blanco:
                seleccionGruposLogisticos.isSelected(row) &&
                row.saturacion > 0 && row.saturacion <= 40,
              seleccionado_verde:
                seleccionGruposLogisticos.isSelected(row) &&
                row.saturacion > 40 && row.saturacion <= 75,
              seleccionado_amarillo:
                seleccionGruposLogisticos.isSelected(row) &&
                row.saturacion > 75 &&  row.saturacion <= 85,
              seleccionado_rojo:
                seleccionGruposLogisticos.isSelected(row) &&
                row.saturacion >= 85
            }"
          ></tr>
        </table>
      </div>
    </div>
  </div>

  <div class="linea-separadora"></div>

  <div class="right-container">
    <div class="inicio" *ngIf="!mostrarSeccionRuta">
      <p class="texto-inicio">Seleccione un grupo logístico</p>
    </div>
    <div class="info-ruta" *ngIf="mostrarSeccionRuta">
      <app-resultado-optimizacion
        [datosOptimizacion]="resultado"
      ></app-resultado-optimizacion>
    </div>
    <div id="mapa"></div>
  </div>
</div>
